# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Tarun Kumar Maharana
first_name: Tarun
last_name: Maharana
greeting: "Hi, I'm Tarun Kumar Maharana!"
tagline: "Just a programmer"
email: tarunkumar@mtarunk.site

description: >- # the ">" symbol means to ignore newlines
  Personal blog - A programmer sharing thoughts on software development,
  Java, and operating systems.

footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://tailwindcss.com/" target="_blank">Tailwind CSS</a>.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.

lang: en # the language of your site (for example: en, fr, cn, ru, etc.)
icon: ⚛️  # the emoji used as the favicon (alternatively, provide image name in /assets/img/)

url: "https://blaze2216.github.io" # the base hostname & protocol for your site
baseurl: "" # the subpath of your site, e.g. /blog/. Leave blank for root

# -----------------------------------------------------------------------------
# About
# -----------------------------------------------------------------------------

about: >-
  I'm a student passionate about Java and Linux.
  Currently focusing on system programming, automation, and clean terminal configurations.

# -----------------------------------------------------------------------------
# Social Media
# -----------------------------------------------------------------------------

social:
  - icon: fa-brands fa-github
    link: https://github.com/Blaze2216
    name: GitHub
  - icon: fa-brands fa-x-twitter
    link: https://twitter.com/tarunkumar2216
    name: Twitter / X
  - icon: fa-brands fa-linkedin
    link: https://linkedin.com/in/tarun-kumar-maharana
    name: LinkedIn
  - icon: fa-brands fa-telegram
    link: https://t.me/usr_blaze
    name: Telegram
  - icon: fa-solid fa-envelope
    link: mailto:tarunkumar@mtarunk.site
    name: Email

# -----------------------------------------------------------------------------
# Navigation
# -----------------------------------------------------------------------------

navigation:
  - title: Articles
    url: /articles
  - title: Tags
    url: /tags
  - title: Projects
    url: /projects
  - title: About
    url: /about

# -----------------------------------------------------------------------------
# Analytics and search engine verification
# -----------------------------------------------------------------------------

google_analytics: # your Google Analytics measurement ID (format: G-XXXXXXXXXX)
# disqus_shortname: # your disqus shortname (uncomment to enable comments)

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

# Pagination (GitHub Pages compatible)
paginate: 10
paginate_path: "/articles/page/:num/"

# Permalinks (clean URLs without .html)
permalink: /articles/:title/

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

# Markdown and syntax highlight
markdown: kramdown

# Build settings
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag

# Includes & excludes
exclude:
  - docs/
  - node_modules/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - .gitignore

# Performance - HTML Compression
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  ignore:
    envs: ['development']
